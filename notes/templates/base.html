<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}NOTES APP{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="{% url 'notes:notes_list' %}">NOTES APP</a>
                <div class="ms-auto d-flex gap-2">
                    {% if user.is_authenticated %}
                        <span class="navbar-text text-white-50">Witaj: {{ user.username }}</span>

                        <form method="post" action="{% url 'notes:logout' %}" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-light btn-sm">Wyloguj</button>
                        </form>
                        {% endif %}
                </div>
            </div> 
        </nav>
        <main class="container my-4">
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
