{% extends "base_auth.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'notes/css/auth.css' %}">
{% endblock %}

{% block content %}
<section class="vh-100 gradient-custom">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card bg-dark text-white" style="border-radius: 1rem;">
          <div class="card-body p-5 text-center">

            <div class="mb-md-5 mt-md-4 pb-5">
              <h2 class="fw-bold mb-2 text-uppercase">Login</h2>
              <p class="text-white-50 mb-4">Podaj login i hasło</p>

              {% if form.errors %}
                <div class="alert alert-danger text-start" role="alert">
                  Nieprawidłowy login lub hasło.
                </div>
              {% endif %}

              <form method="post" novalidate>
                {% csrf_token %}

                <div class="form-outline form-white mb-4">
                  <input
                    type="text"
                    id="typeUsername"
                    name="username"
                    class="form-control form-control-lg"
                    autocomplete="username"
                    required
                  />
                  <label class="form-label" for="typeUsername">Login</label>
                </div>

                <div class="form-outline form-white mb-4">
                  <input
                    type="password"
                    id="typePassword"
                    name="password"
                    class="form-control form-control-lg"
                    autocomplete="current-password"
                    required
                  />
                  <label class="form-label" for="typePassword">Hasło</label>
                </div>

                <button class="btn btn-outline-light btn-lg px-5" type="submit">
                  Zaloguj
                </button>
              </form>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
